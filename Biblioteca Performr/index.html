
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biblioteca Performr</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --border-strong: #C8C5BC;
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-tertiary: #A09D96;
    --accent: #1A1916;

    --cat-recovery: #0F6E56;
    --cat-recovery-bg: #E1F5EE;
    --cat-nutricion: #185FA5;
    --cat-nutricion-bg: #E6F1FB;
    --cat-rendimiento: #534AB7;
    --cat-rendimiento-bg: #EEEDFE;
    --cat-bienestar: #993556;
    --cat-bienestar-bg: #FBEAF0;
    --cat-performr: #1A1916;
    --cat-performr-bg: #F1EFE8;

    --type-tip-text: #0F6E56; --type-tip-bg: #E1F5EE;
    --type-tecnica-text: #3C3489; --type-tecnica-bg: #EEEDFE;
    --type-herramienta-text: #633806; --type-herramienta-bg: #FAEEDA;
    --type-protocolo-text: #712B13; --type-protocolo-bg: #FAECE7;
    --type-guia-text: #0C447C; --type-guia-bg: #E6F1FB;
    --type-mito-text: #791F1F; --type-mito-bg: #FCEBEB;
    --type-score-text: #3C3489; --type-score-bg: #EEEDFE;
    --type-calculadora-text: #633806; --type-calculadora-bg: #FAEEDA;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    text-transform: uppercase;
  }
  .logo span { color: var(--text-primary); }
  .header-title {
    font-size: 26px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .header-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-weight: 300;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    max-width: 340px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
    font-size: 14px;
  }
  .search-input {
    width: 100%;
    padding: 8px 14px 8px 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border-strong); }
  .search-input::placeholder { color: var(--text-tertiary); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    margin-top: 1.25rem;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
  .tab-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .tab-count {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 7px;
    color: var(--text-tertiary);
    font-weight: 400;
  }
  .tab-btn.active .tab-count { background: var(--text-primary); border-color: var(--text-primary); color: white; }

  /* MAIN */
  .main { padding: 2rem 2.5rem; max-width: 1200px; }

  /* TYPE FILTERS */
  .type-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .type-filters-label { font-size: 12px; color: var(--text-tertiary); margin-right: 2px; }
  .type-filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .type-filter-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .type-filter-btn.active { background: var(--text-primary); border-color: var(--text-primary); color: white; }

  /* GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem 1.25rem;
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .card.expanded { border-color: var(--border-strong); transform: none; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-badge {
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.4; letter-spacing: -0.01em; }
  .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; font-weight: 300; flex: 1; }

  /* EXPAND TOGGLE */
  .card-expand-btn {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--text-tertiary);
    font-size: 11px; transition: all 0.2s; margin-top: 1px;
  }
  .card.expanded .card-expand-btn { background: var(--text-primary); border-color: var(--text-primary); color: white; transform: rotate(180deg); }

  /* EXPANDED CONTENT */
  .card-expanded-body {
    display: none;
    margin-top: 4px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    flex-direction: column;
    gap: 10px;
  }
  .card.expanded .card-expanded-body { display: flex; }

  /* ZONE PILLS */
  .zones-list { display: flex; flex-direction: column; gap: 8px; }
  .zone-item {
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .zone-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px;
  }
  .zone-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .zone-text { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; font-weight: 300; }
  .zone-green { background: #F0FAF5; }
  .zone-green .zone-label { color: #0A5C45; }
  .zone-green .zone-dot { background: #1D9E75; }
  .zone-yellow { background: #FEFBEC; }
  .zone-yellow .zone-label { color: #7A5C00; }
  .zone-yellow .zone-dot { background: #E0B020; }
  .zone-red { background: #FEF2F2; }
  .zone-red .zone-label { color: #7C1F1F; }
  .zone-red .zone-dot { background: #DC2626; }

  /* EXERCISE LIST */
  .exercise-list { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
  .exercise-item {
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    padding-left: 14px; position: relative; font-weight: 300;
  }
  .exercise-item::before { content: '→'; position: absolute; left: 0; color: var(--text-tertiary); font-size: 11px; top: 1px; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .card-cat-tag {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-tertiary);
    display: flex; align-items: center; gap: 5px;
  }
  .card-cat-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* PERFORMR SCORES */
  .scores-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .scores-intro-icon { font-size: 20px; margin-top: 2px; }
  .scores-intro-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; font-weight: 300; }
  .scores-intro-text strong { color: var(--text-primary); font-weight: 500; }

  /* SCORE CARD SPECIAL */
  .card.score-card { border-left: 3px solid #534AB7; }
  .score-value-area { margin-top: 4px; }
  .score-bar-track {
    height: 4px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 8px;
  }
  .score-bar-fill {
    height: 100%; border-radius: 4px; background: linear-gradient(90deg, #7F77DD, #534AB7);
    width: 0%; transition: width 1s ease;
  }
  .score-range { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; font-family: 'DM Mono', monospace; }

  /* EMPTY */
  .empty { padding: 3rem; text-align: center; color: var(--text-tertiary); font-size: 14px; }
  .empty-icon { font-size: 32px; margin-bottom: 0.5rem; }

  /* SECTION LABEL for performr */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    font-family: 'DM Mono', monospace;
    margin: 1.5rem 0 0.75rem;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-label:first-child { margin-top: 0; }

  @media (max-width: 640px) {
    .header { padding: 1.25rem 1.25rem 0; }
    .header-top { flex-direction: column; gap: 1rem; }
    .main { padding: 1.25rem; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); max-width: 600px; width: 100%;
    max-height: 85vh; overflow-y: auto; padding: 2rem; position: relative;
    transform: translateY(12px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal-box { transform: translateY(0); }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 50%; width: 30px; height: 30px; font-size: 15px;
    cursor: pointer; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border); }
  .modal-badge { font-size: 10.5px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 3px 9px; border-radius: 20px;
    display: inline-block; margin-bottom: 10px; }
  .modal-title { font-size: 20px; font-weight: 600; color: var(--text-primary);
    letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.3; padding-right: 2rem; }
  .modal-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; font-weight: 300; }
  .modal-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .modal-extra { font-size: 13px; color: var(--text-secondary); line-height: 1.75; font-weight: 300; }
  .modal-extra strong { color: var(--text-primary); font-weight: 500; }
  .modal-zonas-label { font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-tertiary); margin-bottom: 10px; font-family: 'DM Mono', monospace; }
  .modal-zonas { display: flex; flex-direction: column; gap: 10px; }
  .modal-zona { border-radius: var(--radius-md); padding: 1rem 1.1rem; border-left: 3px solid transparent; }
  .zona-green { background: #F0FAF6; border-color: #0F6E56; }
  .zona-orange { background: #FFF4EC; border-color: #D4680A; }
  .zona-yellow { background: #FEFBF0; border-color: #C49A14; }
  .zona-red { background: #FEF2F2; border-color: #C0392B; }
  .zona-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 5px; }
  .zona-green .zona-label { color: #0F6E56; }
  .zona-orange .zona-label { color: #B35500; }
  .zona-yellow .zona-label { color: #A07D10; }
  .zona-red .zona-label { color: #C0392B; }
  .zona-texto { font-size: 13px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 8px; }
  .zona-ejercicios { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .zona-ejercicios li { font-size: 12.5px; color: var(--text-secondary);
    padding-left: 14px; position: relative; line-height: 1.5; }
  .zona-ejercicios li::before { content: '→'; position: absolute; left: 0;
    color: var(--text-tertiary); font-size: 11px; }
  .modal-img { width: 100%; border-radius: var(--radius-md); margin: 1rem 0 0; object-fit: cover; max-height: 240px; }
  .modal-video { margin-top: 1rem; border-radius: var(--radius-md);
    overflow: hidden; aspect-ratio: 16/9; background: var(--bg); }
  .modal-video iframe { width: 100%; height: 100%; border: none; }
  .card { cursor: pointer; }
  .card-more { font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo"><span>Performr</span> · Biblioteca</div>
      <div class="header-title">Tu centro de recursos</div>
      <div class="header-subtitle">Tips, técnicas, herramientas y protocolos para rendir mejor</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" type="text" id="search" placeholder="Buscar recursos..." oninput="renderAll()" />
    </div>
  </div>

  <div class="tabs" id="tabs">
    <!-- rendered by JS -->
  </div>
</div>

<div class="main" id="main">
  <!-- rendered by JS -->
</div>

<script>
const TIPOS = {
  tip:            { label: 'Tip',              textVar: '#0F6E56', bgVar: '#E1F5EE' },
  tecnica:        { label: 'Técnica',          textVar: '#3C3489', bgVar: '#EEEDFE' },
  herramienta:    { label: 'Herramienta',      textVar: '#633806', bgVar: '#FAEEDA' },
  protocolo:      { label: 'Protocolo',        textVar: '#712B13', bgVar: '#FAECE7' },
  guia:           { label: 'Guía',             textVar: '#0C447C', bgVar: '#E6F1FB' },
  mito:           { label: 'Mito vs Realidad', textVar: '#791F1F', bgVar: '#FCEBEB' },
  calculadora:    { label: 'Calculadora',      textVar: '#633806', bgVar: '#FAEEDA' },
  score:          { label: 'Score',            textVar: '#3C3489', bgVar: '#EEEDFE' },
  rutina:         { label: 'Rutina',           textVar: '#085041', bgVar: '#E1F5EE' },
  'como-mejorar': { label: 'Cómo mejorar',    textVar: '#3C3489', bgVar: '#EEEDFE' },
};

// Normaliza tipo que viene de Notion (sin tilde) al key de TIPOS
function normalizeTipo(t) {
  if (!t) return 'tip';
  return (t + '').toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[-_\s]+/g, '-').trim();
}

const CAT_COLORS = {
  'Recuperación': '#0F6E56',
  'Nutrición':    '#185FA5',
  'Rendimiento':  '#534AB7',
  'Bienestar':    '#993556',
  'Performr':     '#1A1916',
  'Rutinas':      '#BA7517',
};

// ─── DATA ───────────────────────────────────────────────────────────────────
const DATA = [
  {
    categoria: 'Rendimiento',
    recursos: [
      {
        tipo: 'tip',
        titulo: 'Calentamiento efectivo',
        desc: '10 min mínimo: movilidad articular + activación muscular + trabajo específico al 60% de intensidad. Un buen calentamiento puede mejorar tu rendimiento hasta un 20%.',
      },
      {
        tipo: 'tip',
        titulo: 'Pico de rendimiento diario',
        desc: 'La mayoría rinde mejor entre las 15 y las 19 hs por temperatura corporal y fuerza muscular. Programá tus sesiones más exigentes en ese rango cuando sea posible.',
      },
      {
        tipo: 'tecnica',
        titulo: 'Periodización básica',
        desc: 'Alternará semanas de carga progresiva con semanas de descarga (deload) cada 3-4 semanas. La adaptación ocurre en la recuperación, no durante el esfuerzo.',
      },
      {
        tipo: 'tecnica',
        titulo: 'Zonas de frecuencia cardíaca',
        desc: 'Z1-Z2 para base aeróbica, Z3-Z4 para umbral, Z5 para picos. Cada zona tiene su función y el error más común es entrenar siempre en Z3, la "zona gris".',
      },
      {
        tipo: 'protocolo',
        titulo: 'Tapering pre-competencia',
        desc: 'Reducí el volumen un 40-60% en los últimos 7-10 días manteniendo la intensidad. Llegás fresco, con más glucógeno y el sistema nervioso recuperado.',
      },
      {
        tipo: 'herramienta',
        titulo: 'Planificador semanal',
        desc: 'Organizá tus sesiones por tipo, intensidad y recuperación para una semana balanceada. El objetivo es maximizar la carga sin comprometer la adaptación.',
      },
      {
        tipo: 'guia',
        titulo: 'Métricas clave a trackear',
        desc: 'RPE, HRV, calidad del sueño y estado anímico son mejores predictores del rendimiento que solo el peso. Registrarlos 3 semanas ya muestra patrones útiles.',
      },
      {
        tipo: 'guia',
        titulo: 'Desarrollo de resiliencia física y mental',
        desc: 'La resiliencia no es aguantar el dolor: es aprender a gestionar la incomodidad. Se entrena con exposición progresiva al estrés, tanto físico (cargas más altas) como mental (situaciones de presión controlada). Un atleta resiliente toma mejores decisiones cuando está cansado.',
      },
      {
        tipo: 'guia',
        titulo: 'Carga de entrenamiento y adaptación',
        desc: 'La carga tiene dos dimensiones: volumen (cuánto) e intensidad (qué tan fuerte). Aumentar ambas al mismo tiempo es el camino al sobreentrenamiento. La regla de oro: no aumentes más del 10% semanal. La adaptación —la mejora real— ocurre en las 24-72 hs post esfuerzo, mientras descansás.',
      },
      {
        tipo: 'guia',
        titulo: 'Mejorar tu rendimiento deportivo',
        desc: 'El rendimiento es la suma de entrenamiento, recuperación, nutrición y mentalidad. Mejorar solo uno de los cuatro tiene límites. Los atletas que más progresan son los que son consistentes en los cuatro pilares, no los que se matan entrenando en uno solo.',
      },
    ]
  },
  {
    categoria: 'Nutrición',
    recursos: [
      {
        tipo: 'tip',
        titulo: 'Timing pre-entreno',
        desc: 'Comé carbohidratos de digestión media 2-3 hs antes. Un snack liviano (banana + mantequilla de maní) alcanza si son 45 min. Entrar con glucógeno disponible marca diferencia en esfuerzos de más de 60 min.',
      },
      {
        tipo: 'tip',
        titulo: 'Ventana anabólica real',
        desc: 'Tenés hasta 2 hs post-entreno para comer proteína. No es tan urgente como se cree, pero sí existe. Apuntá a 25-40g de proteína de calidad en esa ventana para optimizar la síntesis muscular.',
      },
      {
        tipo: 'tip',
        titulo: 'Señales de hambre real',
        desc: 'El hambre real aparece gradualmente, el hambre emocional es repentina e intensa. Aprendé a distinguirlas: esperá 10 min antes de comer. Si sigue, es hambre real. Si pasó, era otra cosa.',
      },
      {
        tipo: 'guia',
        titulo: 'Hidratación según intensidad',
        desc: 'Baja: 400-600ml/h · Media: 600-900ml/h · Alta: 900-1200ml/h. Ajustá por calor y sudoración personal. Una pérdida del 2% del peso corporal en agua ya reduce el rendimiento hasta un 10%.',
      },
      {
        tipo: 'guia',
        titulo: 'Macros por objetivo',
        desc: 'Fuerza: proteína 2g/kg, carbs moderados, grasas saludables. Resistencia: más carbs (5-7g/kg), proteína 1.4-1.6g/kg. Pérdida de grasa: déficit del 15-20% en calorías, proteína alta para preservar masa muscular.',
      },
      {

              { color: 'orange', label: 'Regular', texto: 'No estás logrando bajar el estrés de noche — tu mente sigue activa al dormir. Puede estar afectando la calidad del sueño y tu recuperación general. Creá una rutina de cierre más estructurada.', ejercicios: ['Lectura, respiración o meditación guiada antes de dormir', 'Sin pantallas al menos 1 hora antes de acostarte', 'No entrenar intensamente cerca de la hora de dormir', 'Probar audios de meditación o sonidos suaves'] },
              { color: 'red', label: 'Pobre', texto: 'Tu estrés siguió alto durante la noche — recuperación deficiente con posible impacto en el rendimiento. Es imprescindible lograr mayor relajación nocturna. Establecé una rutina de relajación activa.', ejercicios: ['Respiración 4-7-8 o escaneo corporal obligatorio esta noche', 'Sin pantallas ni luz azul 1 hs antes de dormir', 'Temperatura del cuarto: 18-20°C', 'Evaluar consumo de cafeína o alcohol', 'Escribir lo pendiente antes de dormir (vacía la mente)'] },
            ]
          },
        ]
      },
    ]
  },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeTab = 'Recuperación';
let activeType = 'all';
let LOADED_DATA = null;

// ─── RENDER TABS ─────────────────────────────────────────────────────────────
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const allCats = LOADED_DATA.map(d => d.categoria);
  tabsEl.innerHTML = allCats.map(cat => {
    const section = LOADED_DATA.find(d => d.categoria === cat);
    const count = section.esScores
      ? section.grupos.reduce((a, g) => a + g.recursos.length, 0)
      : section.recursos.length;
    const color = CAT_COLORS[cat] || '#888';
    return `<button class="tab-btn ${cat === activeTab ? 'active' : ''}" onclick="setTab('${cat}')">
      <span class="tab-dot" style="background:${color};"></span>
      ${cat}
      <span class="tab-count">${count}</span>
    </button>`;
  }).join('');
}

function setTab(cat) {
  activeTab = cat;
  activeType = 'all';
  renderTabs();
  renderAll();
}

// ─── TYPE FILTERS ─────────────────────────────────────────────────────────────
function getTypesForTab() {
  const section = LOADED_DATA.find(d => d.categoria === activeTab);
  if (!section) return [];
  const recursos = section.esScores
    ? section.grupos.flatMap(g => g.recursos)
    : section.recursos;
  const types = [...new Set(recursos.map(r => r.tipo))];
  return types;
}

// Todos los tipos disponibles — siempre visibles en todas las pestañas
const ALL_TYPES = ['tip','tecnica','protocolo','herramienta','guia','rutina','como-mejorar','score','calculadora','mito'];

function renderTypeFilters() {
  return `<div class="type-filters">
    <span class="type-filters-label">Filtrar:</span>
    <button class="type-filter-btn ${activeType === 'all' ? 'active' : ''}" onclick="setType('all')">Todos</button>
    ${ALL_TYPES.map(t => `<button class="type-filter-btn ${activeType === t ? 'active' : ''}" onclick="setType('${t}')">${TIPOS[t]?.label || t}</button>`).join('')}
  </div>`;
}

function setType(t) {
  activeType = t;
  renderAll();
}

// ─── CARD & MODAL ────────────────────────────────────────────────────────────
const CARD_REG = {};

function cardHTML(r, cat) {
  const tipo = normalizeTipo(r.tipo);
  const t = TIPOS[tipo] || { label: r.tipo, textVar: '#444', bgVar: '#eee' };
  const dot = CAT_COLORS[cat] || '#888';
  const id = 'c_' + Math.random().toString(36).slice(2);
  CARD_REG[id] = { r, cat };
  const hasMore = r.extra || r.zonas || r.video || r.imagen;
  const titulo = r.titulo || '—';
  const desc = r.desc || '';
  return `<div class="card ${tipo === 'score' ? 'score-card' : ''}" onclick="openModal('${id}')">
    <div class="card-header">
      <span class="card-badge" style="color:${t.textVar};background:${t.bgVar};">${t.label}</span>
    </div>
    <div class="card-title">${titulo}</div>
    <div class="card-desc">${desc}</div>
    <div class="card-footer">
      <span class="card-cat-tag">
        <span class="card-cat-dot" style="background:${dot};"></span>
        ${cat}
      </span>
      ${hasMore ? '<span class="card-more">Ver más →</span>' : ''}
    </div>
  </div>`;
}

function openModal(id) {
  const { r } = CARD_REG[id];
  const tipo = normalizeTipo(r.tipo);
  const t = TIPOS[tipo] || { label: r.tipo, textVar: '#444', bgVar: '#eee' };

  let html = `<span class="modal-badge" style="color:${t.textVar};background:${t.bgVar};">${t.label}</span>
    <div class="modal-title">${r.titulo}</div>
    <div class="modal-desc">${r.desc}</div>`;

  // Imagen
  if (r.imagen) {
    html += `<img class="modal-img" src="${r.imagen}" alt="${r.titulo}" onerror="this.style.display='none'" />`;
  }

  // Video YouTube — acepta link completo o solo el ID
  if (r.video) {
    const ytMatch = r.video.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([^&\s]+)/);
    const ytId = ytMatch ? ytMatch[1] : (r.video.length < 20 ? r.video : null);
    if (ytId) html += `<div class="modal-video"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div>`;
  }

  if (r.extra) html += `<hr class="modal-divider"><div class="modal-extra">${r.extra.replace(/\n/g,'<br>')}</div>`;

  if (r.zonas && r.zonas.length) {
    html += `<hr class="modal-divider"><div class="modal-zonas-label">Recomendaciones por zona</div><div class="modal-zonas">`;
    r.zonas.forEach(z => {
      html += `<div class="modal-zona zona-${z.color}"><div class="zona-label">${z.label}</div><div class="zona-texto">${z.texto}</div>`;
      if (z.ejercicios && z.ejercicios.length) html += `<ul class="zona-ejercicios">${z.ejercicios.map(e => `<li>${e}</li>`).join('')}</ul>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function maybeCloseModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function renderAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const section = LOADED_DATA.find(d => d.categoria === activeTab);
  if (!section) return;

  let html = renderTypeFilters();

  if (section.esScores) {
    // Performr tab: grouped layout
    let totalVisible = 0;
    section.grupos.forEach(grupo => {
      let recursos = grupo.recursos.filter(r => {
        const matchType = activeType === 'all' || normalizeTipo(r.tipo) === activeType;
        const matchQ = !q || (r.titulo||'').toLowerCase().includes(q) || (r.desc||'').toLowerCase().includes(q);
        return matchType && matchQ;
      });
      if (!recursos.length) return;
      totalVisible += recursos.length;
      html += `<div class="section-label">${grupo.label}</div>`;
      html += `<div class="cards-grid">${recursos.map(r => cardHTML(r, activeTab)).join('')}</div>`;
    });
    if (!totalVisible) html += `<div class="empty"><div class="empty-icon">&#128269;</div>No hay resultados para tu búsqueda.</div>`;
  } else {
    let recursos = section.recursos.filter(r => {
      const matchType = activeType === 'all' || normalizeTipo(r.tipo) === activeType;
      const matchQ = !q || (r.titulo||'').toLowerCase().includes(q) || (r.desc||'').toLowerCase().includes(q);
      return matchType && matchQ;
    });
    if (!recursos.length) {
      html += `<div class="empty"><div class="empty-icon">&#128269;</div>No hay resultados para tu búsqueda.</div>`;
    } else {
      html += `<div class="cards-grid">${recursos.map(r => cardHTML(r, activeTab)).join('')}</div>`;
    }
  }

  document.getElementById('main').innerHTML = html;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('tabs').innerHTML = '<div style="padding:12px 0;color:var(--text-tertiary);font-size:13px;">Cargando biblioteca...</div>';
  document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Conectando con la base de datos...</div>';
}

function showError(msg) {
  document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${msg}<br><br><small style="color:var(--text-tertiary)">Usando datos locales como respaldo.</small></div>`;
}

async function init() {
  showLoading();

  // Empezamos siempre con el contenido base hardcodeado
  LOADED_DATA = DATA.map(cat => JSON.parse(JSON.stringify(cat)));

  try {
    const res = await fetch('/.netlify/functions/biblioteca');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    console.log('[Notion] Recursos recibidos:', json.data.length, 'categorías');

    json.data.forEach(notionCat => {
      console.log('[Notion] Procesando categoría:', notionCat.categoria);
      const existing = LOADED_DATA.find(d => d.categoria === notionCat.categoria);

      if (!existing) {
        console.log('[Notion] Categoría nueva, agregando completa:', notionCat.categoria);
        LOADED_DATA.push(notionCat);
        return;
      }

      if (existing.esScores && notionCat.esScores) {
        notionCat.grupos.forEach(notionGrupo => {
          console.log('[Notion] Mergeando grupo:', notionGrupo.label, '—', notionGrupo.recursos.length, 'recurso(s)');
          const existingGrupo = existing.grupos.find(g => g.label === notionGrupo.label);
          if (existingGrupo) {
            existingGrupo.recursos.push(...notionGrupo.recursos);
            console.log('[Notion] ✓ Agregado a grupo existente:', notionGrupo.label);
          } else {
            existing.grupos.push(notionGrupo);
            console.log('[Notion] ✓ Grupo nuevo agregado:', notionGrupo.label);
          }
        });
      } else if (!existing.esScores && notionCat.recursos) {
        console.log('[Notion] Mergeando', notionCat.recursos.length, 'recursos en:', notionCat.categoria);
        // Aseguramos que los recursos tengan campos válidos
        const safeRecursos = notionCat.recursos.map(r => ({
          ...r,
          desc: r.desc || '',
          titulo: r.titulo || '—',
          tipo: r.tipo || 'tip',
        }));
        existing.recursos.push(...safeRecursos);
        console.log('[Notion] ✓ Recursos agregados. Total ahora:', existing.recursos.length);
      }
    });

  } catch (err) {
    console.warn('[Notion] Error al cargar:', err.message);
  }

  activeTab = LOADED_DATA[0].categoria;
  renderTabs();
  renderAll();
}

init();
</script>

  </div>
</div>

  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>
